{% extends 'blog_base.html' %}
{% load my_tags %}
{% block content %}
    {% include 'menu.html' %}
    <ul class="list-group">
        {% for blog in blogs %}
        <li class="list-group-item">
            <div class="col-2 m-1">
                <img src="{{ blog.image|media_filter }}" class="img-fluid rounded float-start me-3" alt="изображение отстутсвует">
            </div>
            <h3 class="mt-3 mb-1">{{ blog.name }}</h3>
            <div class="mb-1 text-body-secondary">{{ blog.created_at }}</div>
            <p class="mb-auto">{{ blog.content|truncatechars:100 }}</p>
            <a href="{% url 'blog:blog_note' blog.pk %}">Continue reading</a>
        </li>
        {% endfor %}
    </ul>
{% endblock %}
