{% extends 'blog_base.html' %}
{% load my_tags %}
{% block title %}Удаление{% endblock %}
{% block content %}
<div class="str text-center mt-5">
    <p >Вы уверены, что хотите удалить запись "{{ blog_note.name }}"?</p>
    <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'blog:blog' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock%}
